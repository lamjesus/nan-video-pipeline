scenes:
  - id: scene-01
    block: GANCHO
    start: 0
    end: 6
    voiceover: ¿Alguna vez te has preguntado cómo tu teléfono sabe exactamente dónde
      estás, sin importar en qué rincón del mundo te encuentres?
    onScreenText:
      - ¿Dónde estoy?
    imagePrompt: Close up of a modern smartphone screen showing a map app with a
      pulsing blue dot, dark background, cinematic lighting, 4k resolution
    motion: zoom-in lento
  - id: scene-02
    block: GANCHO
    start: 6
    end: 12
    voiceover: No es magia. Es una red de satélites que viajan a 14.000 kilómetros
      por hora, orbitando justo por encima de nuestras cabezas.
    onScreenText:
      - 24+ Satélites
    imagePrompt: Wide shot of Earth from space with multiple orbital satellite rings
      glowing in cyan, starry background, realistic style
    motion: paneo lateral
  - id: scene-03
    block: DESARROLLO
    start: 12
    end: 18
    voiceover: Estos satélites emiten señales de radio invisibles, como faros
      cósmicos, que viajan a la velocidad de la luz.
    onScreenText:
      - Velocidad de la Luz
    imagePrompt: Abstract visualization of radio waves radiating from a satellite in
      space towards Earth, blue energy lines, dark space background
    motion: zoom-in lento
  - id: scene-04
    block: DESARROLLO
    start: 18
    end: 24
    voiceover: "Tu teléfono recibe estas señales. Pero aquí está el truco: necesita
      medir el tiempo exacto que tarda cada señal en llegar."
    onScreenText:
      - Medición del Tiempo
    imagePrompt: Split screen showing a satellite sending a signal and a smartphone
      receiving it, with a digital timer overlay counting milliseconds, high
      tech style
    motion: estático
  - id: scene-05
    block: DESARROLLO
    start: 24
    end: 30
    voiceover: Si una señal tarda una milmillonésima de segundo más que otra,
      significa que viene de un satélite más lejano.
    onScreenText:
      - Distancia = Tiempo x Velocidad
    imagePrompt: Diagram showing three satellites at different distances from a
      point on Earth, with lines indicating travel time, clean vector style,
      blue and white colors
    motion: paneo lateral
  - id: scene-06
    block: DESARROLLO
    start: 30
    end: 36
    voiceover: Imagina lanzar tres piedras a un lago tranquilo. Donde los círculos
      de las ondas se cruzan, ahí está el punto exacto.
    onScreenText:
      - Triangulación
    imagePrompt: Top-down view of a dark blue lake surface with three expanding
      concentric circles from different points intersecting at a single center
      point, minimalist style
    motion: zoom-out
  - id: scene-07
    block: DESARROLLO
    start: 36
    end: 42
    voiceover: En el espacio, esto se llama trilateración. Tu dispositivo calcula su
      posición uniendo las señales de al menos cuatro satélites.
    onScreenText:
      - Trilateración
    imagePrompt: 3D geometric visualization of four intersecting spheres in space,
      creating a central intersection point, cyan and white lines, dark
      background
    motion: estático
  - id: scene-08
    block: DESARROLLO
    start: 42
    end: 48
    voiceover: Pero espera, ¿por qué cuatro? Uno es para la precisión espacial y el
      cuarto corrige el reloj de tu teléfono, que no es tan preciso como el de
      los satélites.
    onScreenText:
      - Sincronización
    imagePrompt: Close up of a smartphone internal chip glowing, with a small clock
      icon next to a satellite clock icon, digital interface style
    motion: shake
  - id: scene-09
    block: CIERRE
    start: 48
    end: 54
    voiceover: Así que cada vez que usas mapas, estás conectando con una
      constelación de tecnología que te mantiene en el lugar correcto.
    onScreenText:
      - Conectado al Espacio
    imagePrompt: Person holding a smartphone with a glowing map interface, looking
