    motion: paneo lateral
  - id: scene-10
    block: CIERRE
    start: 54
    end: 60
    voiceover: Si te gustó este viaje por el espacio digital, suscríbete para
      descubrir más secretos ocultos.
    onScreenText:
      - Suscríbete
    imagePrompt: End screen with a subscribe button animation, smartphone icon, and
