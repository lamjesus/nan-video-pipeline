# Guion sobre la comunidad NaN y el propio pipeline — 2 actos (v2, draft)
# Acto 1 (escenas 1-7): qué es la comunidad NaN · Acto 2 (escenas 8-17): este proyecto
# Fuentes: documentación oficial de NaN (Introducción, Empezar, Modelos, Agents, API, Apps)
# NO usar yarn script para este caso (el modelo alucinaría los datos; YAML curado a mano)
#
# ── IMÁGENES (se colocan a mano, escena a escena) ──────────────────────────
# Destino: assets/images/caso-nan-community/scene-NN.png (vale jpg/webp/gif/svg)
#   · Colocada la imagen, `yarn vision` la respeta tal cual (override por escena).
#   · Rehacer UNA escena = borrar su fichero. (--force ignora TODAS, ojo.)
#   · Mientras falten: MEDIA_MODE=local yarn vision caso-nan-community
#     deja placeholder SVG en las que falten → el preview ya se puede montar.
#   · Iterar: yarn compose caso-nan-community → doble click en renders/.../preview.html
#   · TODA captura a 1080x1920 (device mode 9:16): si no, se ve borrosa al escalar.
#
# Lenguaje visual: MEZCLA de capturas reales (Discord, doc oficial, consola,
# dashboard, el proyecto funcionando) e ilustración FLUX para lo conceptual.
# Cada escena indica su fuente recomendada:
#   · CAPTURA: pantallazo real. SIEMPRE tema oscuro. El render hace center-crop
#     (object-fit: cover) → encuadra lo importante al centro, o recorta tú a
#     9:16 (1080x1920). Sube el zoom del editor/web para que se lea tras el crop.
#     En capturas de Discord: ojo con usernames/avatares de terceros (recorta o
#     difumina si hace falta).
#   · FLUX: generar (GUI de NaN) con prompt = imagePrompt de la escena + este
#     ESTILO común (cópialo tal cual como sufijo en todos):
#       Dark cinematic graphic novel illustration, editorial comic art. Bold
#       ink outlines, heavy cross-hatching in shadows. Desaturated charcoal
#       blacks, slate greys, deep blues, muted red accents. Low-key
#       chiaroscuro, dramatic single light source, volumetric haze. Heavy film
#       grain, halftone dithering, cinematic vignette. Ominous, somber mood.
#       Cinematic wide framing. No text, no watermark, no logos.
#       9:16 aspect ratio.
# ────────────────────────────────────────────────────────────────────────────
channel: NaN Community
caseNumber: 1
title: La comunidad que te da GPUs para construir con IA
totalDuration: 102
artDirection:
  medium: Dark cinematic graphic novel illustration, editorial comic art
  lineWork: Bold ink outlines, heavy cross-hatching in shadows
  palette: Desaturated charcoal blacks, slate greys, deep blues, muted red accents
  lighting: Low-key chiaroscuro, dramatic single light source, volumetric haze
  texture: Heavy film grain, halftone dithering, cinematic vignette
  mood: Ominous, somber, sense of hidden power
  composition: Cinematic wide framing, strong depth, dramatic negative space
  humanTreatment: Human presence through silhouettes and distant figures, faces obscured
  constraints: No text, no watermark, no logos, no gore
scenes:
  # [scene-01 · CAPTURA landing ✓] Gancho: la landing de NaN ("GPUs compartidas").
  - id: scene-01
    block: GANCHO
    start: 0
    end: 6
    voiceover: "¿Y si una comunidad te diera GPUs para construir con IA, sin pagar una suscripción carísima?"
    # Sin overlay: la landing capturada ya lleva "NaN" + "GPUs compartidas".
    onScreenText: []
    imagePrompt: A dark server room with rows of glowing GPU racks, volumetric light beams cutting through haze, cinematic perspective from the entrance
    motion: zoom-in lento
  # [scene-02 · CAPTURA doc Empezar ✓] base URL + API key + config OpenAI-compatible.
  - id: scene-02
    block: DESARROLLO
    start: 6
    end: 12
    voiceover: "NaN es infraestructura real: una API compatible con OpenAI. Un base URL, una API key, y cualquier herramienta funciona sin cambios."
    # Captura de docs: la propia página rotula BASE URL / API KEY / OpenAI-compatible.
    onScreenText: []
    imagePrompt: A dark desk with multiple screens showing code editors with API configuration snippets visible on screen
    motion: paneo lateral
