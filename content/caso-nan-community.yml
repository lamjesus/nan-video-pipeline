# Guion sobre la comunidad NaN y el propio pipeline — 2 actos (v2, draft)
# Acto 1 (escenas 1-6): qué es la comunidad NaN · Acto 2 (escenas 7-15): este proyecto
# Fuentes: documentación oficial de NaN (Introducción, Empezar, Modelos, Agents, API, Apps)
# NO usar yarn script para este caso (el modelo alucinaría los datos; YAML curado a mano)
channel: NaN Community
caseNumber: 1
title: La comunidad que te da GPUs para construir con IA
totalDuration: 90
artDirection:
  medium: Dark cinematic graphic novel illustration, editorial comic art
  lineWork: Bold ink outlines, heavy cross-hatching in shadows
  palette: Desaturated charcoal blacks, slate greys, deep blues, muted red accents
  lighting: Low-key chiaroscuro, dramatic single light source, volumetric haze
  texture: Heavy film grain, halftone dithering, cinematic vignette
  mood: Ominous, somber, sense of hidden power
  composition: Cinematic wide framing, strong depth, dramatic negative space
  humanTreatment: Human presence through silhouettes and distant figures, faces obscured
  constraints: No text, no watermark, no logos, no gore
scenes:
  - id: scene-01
    block: GANCHO
    start: 0
    end: 6
    voiceover: "¿Y si una comunidad te diera GPUs para construir con IA, sin pagar una suscripción carísima?"
    onScreenText:
      - "La comunidad NaN"
      - "GPUs para construir"
    imagePrompt: A dark server room with rows of glowing GPU racks, volumetric light beams cutting through haze, cinematic perspective from the entrance
    motion: zoom-in lento
  - id: scene-02
    block: DESARROLLO
    start: 6
    end: 12
    voiceover: "NaN es infraestructura real: una API compatible con OpenAI. Un base URL, una API key, y cualquier herramienta funciona sin cambios."
    onScreenText:
      - "API compatible con OpenAI"
      - "Base URL + API Key"
    imagePrompt: A dark desk with multiple screens showing code editors with API configuration snippets visible on screen
    motion: paneo lateral
  - id: scene-03
    block: DESARROLLO
    start: 12
    end: 18
    voiceover: "Modelos de texto como Qwen y DeepSeek, con tool calling, razonamiento y hasta un millón de tokens de contexto."
    onScreenText:
      - "qwen3.6 · deepseek-v4-flash"
      - "Hasta 1M de contexto"
    imagePrompt: Abstract visualization of a neural network with glowing nodes and connections, dark background with blue and gold light, cinematic data flow
    motion: estático
  - id: scene-04
    block: DESARROLLO
    start: 18
    end: 24
    voiceover: "Y no solo texto: visión con gemma, voz con kokoro, transcripción con whisper, embeddings. Todo en el mismo cluster."
    onScreenText:
      - "Visión · Voz · Audio"
      - "Un solo cluster"
    imagePrompt: A split composition showing three panels, an eye for vision, a waveform for audio, and text characters for text, all in dark graphic novel style with red accent light
    motion: shake
  - id: scene-05
    block: DESARROLLO
    start: 24
    end: 30
    voiceover: "Con NaN Cloud despliegas máquinas virtuales con acceso root, agentes conectados a Telegram y apps directamente desde GitHub."
    onScreenText:
      - "NaN Cloud"
      - "MicroVMs · Agentes · Apps"
    imagePrompt: A dark room with a single terminal screen showing a Linux shell prompt, cables connecting to a small physical server box, dramatic side lighting
    motion: paneo lateral
  - id: scene-06
    block: DESARROLLO
    start: 30
    end: 36
    voiceover: "¿Y qué se puede construir con todo eso? Por ejemplo… esto mismo que estás viendo."
    onScreenText:
      - "¿Qué puedes construir?"
      - "Esto."
    imagePrompt: A dark editing room with a large screen showing a vertical video timeline glowing in the darkness, silhouette watching from behind
    motion: zoom-out
  - id: scene-07
    block: DESARROLLO
    start: 36
    end: 42
    voiceover: "Este video lo está produciendo un pipeline open source que convierte un tema en un video narrado, de principio a fin."
    onScreenText:
      - "nan-video-pipeline"
      - "De un tema a un video"
    imagePrompt: A technical blueprint diagram of a pipeline drawn in glowing chalk lines on a dark wall, seven connected stages, industrial atmosphere
    motion: deriva lenta
  - id: scene-08
    block: DESARROLLO
    start: 42
    end: 48
    voiceover: "Primero, el guion: Qwen escribe un storyboard estructurado con escenas, narración y dirección de arte, y lo valida."
    onScreenText:
      - "1 · Guion"
      - "qwen3.6"
    imagePrompt: A vintage typewriter on a dark desk with screenplay pages scattered around, single dramatic overhead light, ink and paper texture
    motion: zoom-in lento
  - id: scene-09
    block: DESARROLLO
    start: 48
    end: 54
    voiceover: "Las imágenes no se inventan: se generan o se buscan en archivo, y gemma evalúa cada candidata mirando los píxeles reales."
    onScreenText:
      - "2 · Imágenes"
      - "gemma4 elige"
    imagePrompt: A photographic contact sheet of multiple small images on a dark table, one image highlighted under a beam of light, magnifying glass nearby
    motion: paneo lateral
  - id: scene-10
    block: DESARROLLO
    start: 54
    end: 60
    voiceover: "La voz que estás escuchando ahora mismo es kokoro, el modelo de texto a voz del cluster."
    onScreenText:
      - "3 · Voz"
      - "kokoro"
    imagePrompt: A vintage studio microphone in a dark recording booth, sound waves visualized as glowing lines in the air, moody atmosphere
    motion: estático
  - id: scene-11
    block: DESARROLLO
    start: 60
    end: 66
    voiceover: "Y los subtítulos que estás leyendo: whisper transcribe el audio y se alinean con el guion palabra por palabra."
    onScreenText:
      - "4 · Subtítulos"
      - "whisper"
    imagePrompt: Rows of subtitle text panels floating in dark space, one row illuminated, waveform pattern in the background, cinematic depth
    motion: deriva lenta
  - id: scene-12
    block: DESARROLLO
    start: 66
    end: 72
    voiceover: "Composición y render: una página animada se captura frame a frame hasta convertirse en el video final."
    onScreenText:
      - "5 · Render"
      - "GSAP · HyperFrames · ffmpeg"
    imagePrompt: A film strip of frames being assembled in the dark, frames glowing as they connect, mechanical cinema equipment silhouettes
    motion: zoom-in lento
  - id: scene-13
    block: DESARROLLO
    start: 72
    end: 78
    voiceover: "Y nada está alucinado: este guion se apoya en la documentación oficial de la comunidad."
    onScreenText:
      - "Grounded"
      - "Fuentes reales"
    imagePrompt: Open technical documents on a dark desk with key passages glowing, a hand silhouette pointing at a highlighted line, archival mood
    motion: estático
  - id: scene-14
    block: CIERRE
    start: 78
    end: 84
    voiceover: "Todo lo que acabas de ver y oír salió del propio pipeline, corriendo únicamente sobre los modelos de NaN."
    onScreenText:
      - "Hecho por el pipeline"
      - "100% modelos NaN"
    imagePrompt: A dark room with a screen showing the same dark room on its display, recursive mise en abyme effect, single light source, mysterious mood
    motion: deriva lenta
  - id: scene-15
    block: CIERRE
    start: 84
    end: 90
    voiceover: "El código es abierto y la comunidad está esperando. Entra a nan punto builders y construye."
    onScreenText:
      - "Open source"
      - "nan.builders"
    imagePrompt: A dark doorway with bright light coming through, a single person standing at the threshold, cinematic wide shot, sense of opportunity and entry
    motion: zoom-out
