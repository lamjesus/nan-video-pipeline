    block: DESARROLLO
    start: 12
    end: 18
    voiceover: "El modelo principal es Qwen: multimodal, con tool calling, razonamiento y un contexto enorme. Y es solo uno del catálogo abierto."
    # Voz alineada a lo que se ve (qwen3.6 "el principal"); el 1M es de deepseek, fuera de frame.
    onScreenText: []
    imagePrompt: Abstract visualization of a neural network with glowing nodes and connections, dark background with blue and gold light, cinematic data flow
    motion: estático
