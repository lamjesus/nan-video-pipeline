# Guion sobre la comunidad NaN y el propio flujo — 2 actos (v3, conversacional)
# Acto 1 (escenas 1-7): qué es la comunidad NaN · Acto 2 (escenas 8-17): este proyecto
# Tono: cercano y humano (frases cortas, directas). Términos en español
# (flujo, fotograma, código abierto…); se conservan nombres propios (Qwen,
# kokoro, whisper, gemma, NaN, GitHub, OpenAI).
# Fuentes: documentación oficial de NaN. NO usar yarn script (datos curados a mano).
#
# Tiempos PROPORCIONALES a la narración (cada imagen aguanta lo que dura su
# frase). compose los reescala a la duración real del audio manteniendo la
# proporción → sin desfase voz/imagen.
#
# Imágenes: assets/images/caso-nan-community/scene-NN.png (1080x1920). Todas
# colocadas. Capturas reales + diagramas SVG generados + 2 ilustraciones FLUX.
channel: NaN Community
caseNumber: 1
title: La comunidad que te da GPUs para construir con IA
totalDuration: 97
artDirection:
  medium: Dark cinematic graphic novel illustration, editorial comic art
  lineWork: Bold ink outlines, heavy cross-hatching in shadows
  palette: Desaturated charcoal blacks, slate greys, deep blues, muted red accents
  lighting: Low-key chiaroscuro, dramatic single light source, volumetric haze
  texture: Heavy film grain, halftone dithering, cinematic vignette
  mood: Ominous, somber, sense of hidden power
  composition: Cinematic wide framing, strong depth, dramatic negative space
  humanTreatment: Human presence through silhouettes and distant figures, faces obscured
  constraints: No text, no watermark, no logos, no gore
scenes:
  # [scene-01 · CAPTURA landing ✓] Gancho: la landing de NaN ("GPUs compartidas").
  - id: scene-01
    block: GANCHO
    start: 0
    end: 5
    voiceover: "Imagina tener GPUs para crear con inteligencia artificial. Sin pagar una suscripción carísima. Eso existe, y se llama NaN."
    onScreenText: []
    imagePrompt: A dark server room with rows of glowing GPU racks, volumetric light beams cutting through haze, cinematic perspective from the entrance
    motion: zoom-in lento
  # [scene-02 · CAPTURA docs ✓] base URL + clave + config compatible con OpenAI.
  - id: scene-02
    block: DESARROLLO
    start: 5
    end: 12
    voiceover: "Y no es humo. Es una API de verdad, compatible con OpenAI. Pones una dirección y una clave, y cualquier herramienta funciona. Sin tocar nada más."
    onScreenText: []
    imagePrompt: A dark desk with multiple screens showing code editors with API configuration snippets visible on screen
    motion: paneo lateral
  # [scene-03 · CAPTURA docs ✓] qwen3.6 (principal) + gemma4 con capacidades.
  - id: scene-03
    block: DESARROLLO
    start: 12
    end: 18
    voiceover: "¿El modelo estrella? Qwen. Entiende texto e imágenes, razona, usa herramientas. Y no está solo: hay todo un catálogo abierto."
    onScreenText: []
    imagePrompt: Abstract visualization of a neural network with glowing nodes and connections, dark background with blue and gold light, cinematic data flow
    motion: estático
  # [scene-04 · CAPTURA docs ✓] kokoro (TTS) + whisper (STT).
  - id: scene-04
    block: DESARROLLO
    start: 18
    end: 24
    voiceover: "Pero hay más. Kokoro pone la voz. Whisper transcribe en noventa y nueve idiomas. Ver, hablar, escuchar… todo en el mismo sitio."
    onScreenText: []
    imagePrompt: A split composition showing three panels, an eye for vision, a waveform for audio, and text characters for text, all in dark graphic novel style with red accent light
    motion: estático
  # [scene-05 · CAPTURA Hermes Telegram ✓] agente real (lista de cronjobs).
  - id: scene-05
    block: DESARROLLO
    start: 24
    end: 31
    voiceover: "¿Quieres desplegar algo? NaN Cloud te da máquinas con control total. Agentes en Telegram. Aplicaciones directas desde GitHub. Tú lo subes, ellos lo levantan."
    onScreenText: []
    imagePrompt: A dark room with a single terminal screen showing a Linux shell prompt, cables connecting to a small physical server box, dramatic side lighting
    motion: estático
