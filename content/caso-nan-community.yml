  - id: scene-06
    block: DESARROLLO
    start: 31
    end: 36
    voiceover: "Y ojo, que esto se usa de verdad. La comunidad mueve cientos de millones de tokens al mes. Esto no es un juguete."
    onScreenText: []
    imagePrompt: A glowing line chart of model usage over time on a dark dashboard, multiple colored curves, data visualization aesthetic
    motion: estático
