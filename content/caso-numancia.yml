    motion: shake
  - id: scene-08
    block: DESARROLLO
    start: 70
    end: 80
    voiceover: Aunque Roma ganó la batalla, Numancia ganó la guerra moral. Se
      convirtió en el mito fundacional de la resistencia española contra la
      opresión.
    onScreenText:
      - Victoria Moral
      - Mito de Resistencia
    imagePrompt: Ancient ruins of Numancia in modern day, sunlight hitting the
