    end: 10
    voiceover: Imagina una ciudad que hizo temblar al imperio más poderoso de la
      historia, no con ejércitos, sino con su negativa a rendirse jamás.
    onScreenText:
      - El Imperio Inquebrantable
      - La Ciudad Imposible
