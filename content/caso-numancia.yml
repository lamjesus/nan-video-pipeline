  - id: scene-09
    block: CIERRE
    start: 80
    end: 90
    voiceover: Hoy, Numancia no es solo tierra quemada. Es un recordatorio eterno de
      que la dignidad humana puede desafiar incluso al imperio más fuerte.
    onScreenText:
      - Dignidad Eterna
      - Legado Indestructible
    imagePrompt: Sunset over the archaeological site, long shadows, golden light,
