  - id: scene-02
    block: GANCHO
    start: 10
    end: 20
    voiceover: Nos encontramos en la meseta castellana, siglo II a.C. Numancia no
      era solo una fortaleza; era el símbolo de la libertad celtíbera.
    onScreenText:
      - 206 a.C.
      - La Meseta Castellana
    imagePrompt: Aerial view of the Duero river valley, ancient stone walls on a
      hill, golden hour sunlight, historical atmosphere
    motion: paneo lateral
  - id: scene-03
    block: DESARROLLO
    start: 20
    end: 30
    voiceover: Roma había conquistado todo el Mediterráneo, pero Numancia se negaba
      a pagar tributo. Para Escipión, esto no era una guerra, era una cuestión
      de honor.
    onScreenText:
      - Nunca Rendirse
      - Honor vs. Conquista
    imagePrompt: Close up of a Roman general's face looking determined, storm clouds
      gathering in the background, intense mood
    motion: zoom-in lento
  - id: scene-04
    block: DESARROLLO
    start: 30
    end: 40
    voiceover: El cónsul Publio Cornelio Escipión Emiliano construyó una doble
      muralla de circunvalación. Una jaula de piedra para atrapar a los
      valientes.
    onScreenText:
      - La Doble Muralla
      - Asedio Total
    imagePrompt: Diagrammatic animation of Roman siege walls surrounding a city,
      soldiers building fortifications, tactical view
    motion: paneo lateral
  - id: scene-05
    block: DESARROLLO
    start: 40
    end: 50
    voiceover: Los años pasaron. La hambruna azotó la ciudad. Pero los numantinos no
      abrieron las puertas. Su resistencia se convirtió en una leyenda viva.
    onScreenText:
      - Año 4 del Asedio
      - Resistencia Absoluta
    imagePrompt: Interior of a stone house, dark and cramped, people looking out of
      windows with determination, dim lighting
    motion: estático
  - id: scene-06
    block: DESARROLLO
    start: 50
    end: 60
    voiceover: La historia registra que, ante la inevitabilidad de la caída, muchos
      ciudadanos optaron por el suicidio colectivo antes que convertirse en
      esclavos.
    onScreenText:
      - Libertad o Muerte
      - El Sacrificio Final
    imagePrompt: Silhouettes of people standing on the walls looking at the Roman
      camp, solemn and tragic atmosphere, muted colors
    motion: deriva
  - id: scene-07
    block: DESARROLLO
    start: 60
    end: 70
    voiceover: Cuando finalmente cayó, Roma ordenó quemar la ciudad hasta sus
      cimientos. Querían borrarla de la memoria, pero el fuego no pudo con su
      espíritu.
    onScreenText:
      - 133 a.C.
      - Ciudad Destruída
    imagePrompt: Fire consuming ancient stone structures, smoke rising into the sky,
