<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="42%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#vig)"/>

  <!-- Título -->
  <text x="540" y="118" text-anchor="middle" fill="#e2e8f0" font-size="56" font-weight="800" letter-spacing="0.5">nan-video-pipeline</text>
  <text x="540" y="162" text-anchor="middle" fill="#94a3b8" font-size="28" font-weight="500">cómo está construido · 7 etapas</text>

  <!-- Leyenda -->
  <circle cx="372" cy="208" r="7" fill="#38bdf8"/>
  <text x="388" y="215" fill="#7dd3fc" font-size="23">modelos NaN</text>
  <circle cx="592" cy="208" r="7" fill="#64748b"/>
  <text x="608" y="215" fill="#94a3b8" font-size="23">herramientas locales</text>

  <!-- Flechas (spine) -->
  <g stroke="#475569" stroke-width="2.5">
    <line x1="540" y1="300" x2="540" y2="404" marker-end="url(#arrow)"/>
    <line x1="540" y1="476" x2="540" y2="549" marker-end="url(#arrow)"/>
    <line x1="540" y1="621" x2="540" y2="694" marker-end="url(#arrow)"/>
    <line x1="540" y1="766" x2="540" y2="839" marker-end="url(#arrow)"/>
    <line x1="540" y1="911" x2="540" y2="984" marker-end="url(#arrow)"/>
    <line x1="540" y1="1056" x2="540" y2="1129" marker-end="url(#arrow)"/>
    <line x1="540" y1="1201" x2="540" y2="1274" marker-end="url(#arrow)"/>
    <line x1="540" y1="1346" x2="540" y2="1449" marker-end="url(#arrow)"/>
  </g>

  <!-- Input: TEMA -->
  <g>
    <rect x="400" y="252" width="280" height="62" rx="31" fill="#2a0e12" stroke="#ef4444" stroke-width="2"/>
    <text x="540" y="291" text-anchor="middle" fill="#fca5a5" font-size="30" font-weight="700" letter-spacing="2">TEMA</text>
  </g>

  <!-- Etapas (modelos NaN = azul, locales = gris) -->
  <!-- 1 Guion -->
  <g>
    <rect x="210" y="404" width="660" height="72" rx="14" fill="#0e1a2b" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="258" cy="440" r="20" fill="#1e3a5f"/><text x="258" y="448" text-anchor="middle" fill="#7dd3fc" font-size="24" font-weight="700">1</text>
    <text x="300" y="449" fill="#e2e8f0" font-size="32" font-weight="700">Guion</text>
    <rect x="650" y="416" width="200" height="44" rx="22" fill="#1e3a5f"/><text x="750" y="445" text-anchor="middle" fill="#7dd3fc" font-size="25" font-weight="600">qwen3.6</text>
  </g>
  <!-- 2 Visión -->
  <g>
    <rect x="210" y="549" width="660" height="72" rx="14" fill="#0e1a2b" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="258" cy="585" r="20" fill="#1e3a5f"/><text x="258" y="593" text-anchor="middle" fill="#7dd3fc" font-size="24" font-weight="700">2</text>
    <text x="300" y="594" fill="#e2e8f0" font-size="32" font-weight="700">Visión</text>
    <rect x="660" y="561" width="190" height="44" rx="22" fill="#1e3a5f"/><text x="755" y="590" text-anchor="middle" fill="#7dd3fc" font-size="25" font-weight="600">gemma4</text>
  </g>
  <!-- 3 Voz -->
  <g>
    <rect x="210" y="694" width="660" height="72" rx="14" fill="#0e1a2b" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="258" cy="730" r="20" fill="#1e3a5f"/><text x="258" y="738" text-anchor="middle" fill="#7dd3fc" font-size="24" font-weight="700">3</text>
    <text x="300" y="739" fill="#e2e8f0" font-size="32" font-weight="700">Voz</text>
    <rect x="668" y="706" width="182" height="44" rx="22" fill="#1e3a5f"/><text x="759" y="735" text-anchor="middle" fill="#7dd3fc" font-size="25" font-weight="600">kokoro</text>
  </g>
  <!-- 4 Subtítulos -->
  <g>
    <rect x="210" y="839" width="660" height="72" rx="14" fill="#0e1a2b" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="258" cy="875" r="20" fill="#1e3a5f"/><text x="258" y="883" text-anchor="middle" fill="#7dd3fc" font-size="24" font-weight="700">4</text>
    <text x="300" y="884" fill="#e2e8f0" font-size="32" font-weight="700">Subtítulos</text>
    <rect x="666" y="851" width="184" height="44" rx="22" fill="#1e3a5f"/><text x="758" y="880" text-anchor="middle" fill="#7dd3fc" font-size="25" font-weight="600">whisper</text>
  </g>
  <!-- 5 Composición -->
  <g>
    <rect x="210" y="984" width="660" height="72" rx="14" fill="#11161f" stroke="#475569" stroke-width="2"/>
    <circle cx="258" cy="1020" r="20" fill="#1e293b"/><text x="258" y="1028" text-anchor="middle" fill="#cbd5e1" font-size="24" font-weight="700">5</text>
    <text x="300" y="1029" fill="#e2e8f0" font-size="32" font-weight="700">Composición</text>
    <rect x="700" y="996" width="150" height="44" rx="22" fill="#1e293b"/><text x="775" y="1025" text-anchor="middle" fill="#94a3b8" font-size="25" font-weight="600">GSAP</text>
  </g>
  <!-- 6 Render -->
  <g>
    <rect x="210" y="1129" width="660" height="72" rx="14" fill="#11161f" stroke="#475569" stroke-width="2"/>
    <circle cx="258" cy="1165" r="20" fill="#1e293b"/><text x="258" y="1173" text-anchor="middle" fill="#cbd5e1" font-size="24" font-weight="700">6</text>
    <text x="300" y="1174" fill="#e2e8f0" font-size="32" font-weight="700">Render</text>
    <rect x="612" y="1141" width="238" height="44" rx="22" fill="#1e293b"/><text x="731" y="1170" text-anchor="middle" fill="#94a3b8" font-size="25" font-weight="600">HyperFrames</text>
  </g>
  <!-- 7 Mux -->
  <g>
    <rect x="210" y="1274" width="660" height="72" rx="14" fill="#11161f" stroke="#475569" stroke-width="2"/>
    <circle cx="258" cy="1310" r="20" fill="#1e293b"/><text x="258" y="1318" text-anchor="middle" fill="#cbd5e1" font-size="24" font-weight="700">7</text>
    <text x="300" y="1319" fill="#e2e8f0" font-size="32" font-weight="700">Mux</text>
    <rect x="700" y="1286" width="150" height="44" rx="22" fill="#1e293b"/><text x="775" y="1315" text-anchor="middle" fill="#94a3b8" font-size="25" font-weight="600">ffmpeg</text>
  </g>

  <!-- Output: MP4 -->
  <g>
    <rect x="380" y="1449" width="320" height="64" rx="32" fill="#2a0e12" stroke="#ef4444" stroke-width="2"/>
    <text x="540" y="1489" text-anchor="middle" fill="#fca5a5" font-size="30" font-weight="700" letter-spacing="1">MP4 · 9:16</text>
  </g>

  <!-- Footer -->
  <text x="540" y="1600" text-anchor="middle" fill="#64748b" font-size="26" font-weight="500">Texto, visión, voz y audio — 100% sobre el cluster NaN</text>
</svg>
