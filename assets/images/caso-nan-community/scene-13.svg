<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="42%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/><rect width="1080" height="1920" fill="url(#vig)"/>

  <text x="540" y="150" text-anchor="middle" fill="#e2e8f0" font-size="52" font-weight="800">4 · Subtítulos</text>
  <text x="540" y="196" text-anchor="middle" fill="#94a3b8" font-size="28">whisper transcribe y se alinea con el guion</text>

  <!-- column headers -->
  <text x="290" y="330" text-anchor="middle" fill="#7dd3fc" font-size="28" font-weight="700">Guion (canónico)</text>
  <text x="790" y="330" text-anchor="middle" fill="#cbd5e1" font-size="28" font-weight="700">whisper (audio)</text>

  <!-- connector lines (LCS match) -->
  <g stroke="#38bdf8" stroke-width="2" opacity="0.5">
    <line x1="430" y1="400" x2="650" y2="408"/>
    <line x1="430" y1="500" x2="650" y2="520"/>
    <line x1="430" y1="600" x2="650" y2="592"/>
    <line x1="430" y1="700" x2="650" y2="724"/>
  </g>

  <!-- left chips (canonical) -->
  <g font-size="28" font-weight="600">
    <rect x="150" y="372" width="280" height="56" rx="12" fill="#0e1a2b" stroke="#38bdf8" stroke-width="1.5"/><text x="290" y="409" text-anchor="middle" fill="#e2e8f0">Imagina</text>
    <rect x="150" y="472" width="280" height="56" rx="12" fill="#0e1a2b" stroke="#38bdf8" stroke-width="1.5"/><text x="290" y="509" text-anchor="middle" fill="#e2e8f0">una</text>
    <rect x="150" y="572" width="280" height="56" rx="12" fill="#0e1a2b" stroke="#38bdf8" stroke-width="1.5"/><text x="290" y="609" text-anchor="middle" fill="#e2e8f0">ciudad</text>
    <rect x="150" y="672" width="280" height="56" rx="12" fill="#0e1a2b" stroke="#38bdf8" stroke-width="1.5"/><text x="290" y="709" text-anchor="middle" fill="#e2e8f0">próspera</text>
  </g>

  <!-- right chips (whisper + timestamp) -->
  <g font-size="26" font-weight="600">
    <rect x="650" y="380" width="280" height="56" rx="12" fill="#11161f" stroke="#475569" stroke-width="1.5"/><text x="668" y="415" fill="#e2e8f0">Imagina</text><text x="912" y="415" text-anchor="end" fill="#64748b" font-size="20">0.0s</text>
    <rect x="650" y="492" width="280" height="56" rx="12" fill="#11161f" stroke="#475569" stroke-width="1.5"/><text x="668" y="527" fill="#e2e8f0">una</text><text x="912" y="527" text-anchor="end" fill="#64748b" font-size="20">0.6s</text>
    <rect x="650" y="564" width="280" height="56" rx="12" fill="#11161f" stroke="#475569" stroke-width="1.5"/><text x="668" y="599" fill="#e2e8f0">ciudad</text><text x="912" y="599" text-anchor="end" fill="#64748b" font-size="20">0.9s</text>
    <rect x="650" y="696" width="280" height="56" rx="12" fill="#11161f" stroke="#475569" stroke-width="1.5"/><text x="668" y="731" fill="#e2e8f0">próspera</text><text x="912" y="731" text-anchor="end" fill="#64748b" font-size="20">1.4s</text>
  </g>

  <!-- arrow down to SRT -->
  <line x1="540" y1="800" x2="540" y2="900" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>

  <rect x="270" y="900" width="540" height="120" rx="16" fill="#0e1a2b" stroke="#38bdf8" stroke-width="2"/>
  <text x="540" y="948" text-anchor="middle" fill="#7dd3fc" font-size="30" font-weight="700">SRT estilo CapCut</text>
  <text x="540" y="985" text-anchor="middle" fill="#cbd5e1" font-size="24">alineación LCS · chunks de ~42 caracteres</text>

  <text x="540" y="1130" text-anchor="middle" fill="#64748b" font-size="26">El texto que lees encaja con el audio palabra por palabra.</text>
</svg>
