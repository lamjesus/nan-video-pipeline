# Configuración ajustable del pipeline — sin tocar TypeScript.
# Los secretos (NAN_BASE_URL, NAN_API_KEY) y los overrides puntuales
# (NAN_VOICE_ID, MEDIA_PROVIDERS) siguen viviendo en .env.
# Lo carga src/config/index.ts al arrancar.

# Nombres de modelo del cluster NaN. Si la plataforma los renombra,
# se cambian AQUÍ (no en el código).
models:
  text: qwen3.6                 # guion / chat / tool calling
  textHeavy: deepseek-v4-flash  # razonamiento largo (alternativa)
  # Visión: mimo-v2.5 está CIEGO en el cluster, no se usa
  # (ver docs/TROUBLESHOOTING.md > mimo-v2.5).
  visionEval: gemma4            # evaluación visual real (describe base64)
  visionEvalFallback: qwen3.6   # si visionEval falla, se usa este
  tts: kokoro                   # texto a voz
  stt: whisper                  # voz a texto (subtítulos)
  embedding: qwen3-embedding    # embeddings vectoriales (RAG + pre-ranking de candidatas)
  # Reranker anunciado (Qwen3-Reranker-8B) — aún NO desplegado a 2026-06-11:
  # el gateway no expone ninguna ruta de rerank (ver docs/TROUBLESHOOTING.md).
  # `yarn models:check` lo sondea; cuando pase a ✅, cambiar aquí el backend
  # del pre-ranking.
  reranker: rerank

# Voz por defecto de kokoro. Override puntual con la env NAN_VOICE_ID.
voice:
  default: em_alex              # em_alex (masculina) / ef_dora (femenina)

# Proveedores de imagen por defecto, en orden de prioridad.
# Override puntual con la env MEDIA_PROVIDERS (csv).
media:
  # Modo de imágenes (override puntual con la env MEDIA_MODE):
  #   auto  — búsqueda en providers (Wikimedia…) + selección con gemma4.
  #   local — cero red: imágenes generadas fuera (IA externa) y colocadas a
  #           mano. Por escena: assets/images/<slug>/<scene-id>.jpg se usa tal
  #           cual; el resto se empareja contra assets/images/_pool/ por nombre
  #           de fichero descriptivo. Ver AGENTS.md > Imágenes locales.
  # En AMBOS modos, una imagen ya colocada para una escena se respeta
  # (regenerar = borrarla o `yarn vision <slug> --force`).
  mode: auto
  providers:
    - wikimedia
    - local
  # Candidatas por proveedor y escena que evalúa el modelo de visión.
  # Más candidatas = mejor selección pero más llamadas a gemma4 por escena.
  candidates: 8
  # Pre-ranking por texto (título de la candidata vs imagePrompt) ANTES de
  # descargar: solo las `shortlist` mejores bajan y pasan por gemma4.
  # Hoy usa qwen3-embedding (similitud de coseno); 0 = desactivado.
  shortlist: 5
